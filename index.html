<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
</head>
<body>
    <main>
        <section class="login">
            <article class="imagem">
                <!-- Imagem -->
            </article>
            <article class="form">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                
                <form action="login.php" method="post">
                    
                    
                    <div class="formInput">
                        <span class="material-symbols-outlined">person</span>
                        <input type="text" name="email" id="email" required maxlength="30" autocomplete="email">
                        <label for="email">E-mail</label>
                    </div>
                    
                    <div class="formInput">
                        <span class="material-symbols-outlined">key</span>
                        <input type="password" name="senha" id="senha" required minlength="5"
                        maxlength="20" autocomplete="new-password current-password">
                        <label for="senha">Senha:</label>
                    </div>

                    <div class="formInput">
                        <input type="submit" value="enviar" class="enviar">
                        <a href="#" class="forgotPassword">Esqueci a Senha</a>
                    </div>
                </form>
            </article>
        </section>
    </main>
</body>
</html>
